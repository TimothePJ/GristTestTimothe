<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="utf-8">
  <title>Gestion Équipe</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <section class="dop-panel" aria-labelledby="dopPanelTitle">
    <h2 id="dopPanelTitle">Attribution DOP projet</h2>
    <div class="dop-controls">
      <div class="dropdown-container">
        <label for="dopProjectSelect">Projet</label>
        <select id="dopProjectSelect" disabled>
          <option value="">Chargement des projets...</option>
        </select>
      </div>
      <div class="dropdown-container">
        <label for="dopValueSelect">DOP</label>
        <select id="dopValueSelect">
          <option value="">Commun</option>
          <option value="1">DOP 1</option>
          <option value="2">DOP 2</option>
        </select>
      </div>
      <button type="button" id="applyDopButton" disabled>Appliquer</button>
    </div>
    <div id="dopStatus" class="dop-status" role="status" aria-live="polite"></div>
  </section>

  <div class="toolbar" aria-label="Actions de gestion des membres">
    <button type="button" id="addMemberButton">Ajouter un membre</button>
    <button type="button" id="editMemberButton" disabled>Modifier</button>
    <button type="button" id="deleteMemberButton" disabled>Supprimer</button>
  </div>

  <div class="table-container">
    <table id="dataTable">
      <thead>
        <tr id="tableHeader">
          <th>Prénom</th>
          <th>Nom</th>
          <th>Email</th>
          <th>Service</th>
          <th>Role</th>
          <th>IdTrefle</th>
          <th>Externe</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>

  <div id="contextMenu" class="context-menu">
    <button id="addRowOption">Ajouter un membre</button>
    <button id="editOption">Modifier</button>
    <button id="deleteOption">Supprimer</button>
  </div>

  <dialog id="addRowDialog">
    <form method="dialog">
      <h3>Ajouter un nouveau membre</h3>
      <label for="prenom">Prénom:</label>
      <input type="text" id="prenom" name="prenom" required>
      <label for="nom">Nom:</label>
      <input type="text" id="nom" name="nom" required>
      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required>
      <label for="service">Service:</label>
      <select id="service" name="service" required>
        <option value="" selected disabled>Choisir un service</option>
        <option value="Structure">Structure</option>
        <option value="Topographie">Topographie</option>
      </select>
      <label for="role">Role:</label>
      <select id="role" name="role" required>
        <option value="" selected disabled>Choisir un rôle</option>
        <option value="Projeteur">Projeteur</option>
        <option value="Ingénieur">Ingénieur</option>
      </select>
      <label for="idTrefle">IdTrefle:</label>
      <input type="text" id="idTrefle" name="idTrefle">
      <label class="checkbox-label" for="externe">
        <input type="checkbox" id="externe" name="externe">
        Externe
      </label>
      <div class="dialog-buttons">
        <button type="submit" id="confirmAddRowButton">Ajouter</button>
        <button type="button" id="cancelAddRowButton">Annuler</button>
      </div>
    </form>
  </dialog>

  <dialog id="editRowDialog">
    <form method="dialog">
      <h3>Modifier le membre</h3>
      <label for="editPrenom">Prénom:</label>
      <input type="text" id="editPrenom" name="editPrenom" required>
      <label for="editNom">Nom:</label>
      <input type="text" id="editNom" name="editNom" required>
      <label for="editEmail">Email:</label>
      <input type="email" id="editEmail" name="editEmail" required>
      <label for="editService">Service:</label>
      <select id="editService" name="editService" required>
        <option value="" disabled>Choisir un service</option>
        <option value="Structure">Structure</option>
        <option value="Topographie">Topographie</option>
      </select>
      <label for="editRole">Role:</label>
      <select id="editRole" name="editRole" required>
        <option value="" disabled>Choisir un rôle</option>
        <option value="Projeteur">Projeteur</option>
        <option value="Ingénieur">Ingénieur</option>
      </select>
      <label for="editIdTrefle">IdTrefle:</label>
      <input type="text" id="editIdTrefle" name="editIdTrefle">
      <label class="checkbox-label" for="editExterne">
        <input type="checkbox" id="editExterne" name="editExterne">
        Externe
      </label>
      <div class="dialog-buttons">
        <button type="submit">Enregistrer</button>
        <button type="button" id="cancelEditRowButton">Annuler</button>
      </div>
    </form>
  </dialog>

  <script src="app.js"></script>
</body>

</html>
