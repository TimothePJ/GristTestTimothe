<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Time-Out — Congés & absences</title>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <link rel="stylesheet" href="./assets/css/variables.css" />
  <link rel="stylesheet" href="./assets/css/styles.css" />
  <script type="module" src="./assets/js/main.js"></script>
</head>
<body>
  <header id="to-toolbar" class="to-toolbar">
    <div id="to-legend" class="to-legend"></div>
    <div class="to-nav">
      <button type="button" id="to-prev" aria-label="Période précédente">‹</button>
      <button type="button" id="to-today">Aujourd'hui</button>
      <button type="button" id="to-next" aria-label="Période suivante">›</button>
    </div>
    <div class="to-zoom">
      <button type="button" data-to-zoom="week">Semaine</button>
      <button type="button" data-to-zoom="month">Mois</button>
      <button type="button" data-to-zoom="quarter">Trimestre</button>
    </div>
    <div id="to-range" class="to-range" aria-live="polite"></div>
  </header>
  <div id="to-banner" class="to-banner" hidden>Utilisateur non reconnu — lecture seule.</div>
  <main id="to-main" class="to-main"></main>
  <section id="to-empty" class="to-empty" hidden>Aucun collaborateur à afficher.</section>
  <!-- modals are body-level siblings so a board re-render never destroys them -->
  <div id="to-reason-modal" class="to-modal" style="display:none"></div>
  <div id="to-edit-modal" class="to-modal" style="display:none"></div>
</body>
</html>
