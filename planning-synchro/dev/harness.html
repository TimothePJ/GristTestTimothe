<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Planning + Plan de charge</title>
  <script type="module" src="./mock-grist.js"></script>
  <script src="https://unpkg.com/vis-timeline/standalone/umd/vis-timeline-graph2d.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/vis-timeline/styles/vis-timeline-graph2d.min.css" />
  <link rel="stylesheet" href="../assets/css/variables.css" />
  <link rel="stylesheet" href="../assets/css/styles.css" />
  <script type="module" src="../assets/js/main.js"></script>
</head>
<body>
  <header id="ps-toolbar" class="ps-toolbar">
    <div class="ps-project">
      <label for="ps-project-select">Projet :</label>
      <select id="ps-project-select"><option value="">Choisir un projet</option></select>
    </div>
    <div class="ps-nav">
      <button id="ps-prev" type="button" title="Periode precedente">&lt;</button>
      <button id="ps-today" type="button">Aujourd'hui</button>
      <button id="ps-next" type="button" title="Periode suivante">&gt;</button>
    </div>
    <div class="ps-zoom" role="group" aria-label="Zoom">
      <button type="button" data-ps-zoom="week">Semaine</button>
      <button type="button" data-ps-zoom="month" class="is-active">Mois</button>
      <button type="button" data-ps-zoom="year">Annee</button>
    </div>
    <div id="ps-range" class="ps-range" aria-live="polite">-</div>
  </header>

  <section id="ps-empty" class="ps-empty" hidden>
    <p>Selectionne un projet pour afficher les plannings.</p>
  </section>

  <main id="ps-main" class="ps-main" hidden>
    <div class="ps-pane ps-pane--planning">
      <label class="ps-aggregate">
        <input id="ps-aggregate-toggle" type="checkbox" />
        <span>Rassembler visuellement le planning</span>
      </label>
      <div id="ps-planning" class="ps-planning"></div>
    </div>
    <div id="ps-splitter" class="ps-splitter" role="separator" aria-orientation="horizontal"
         aria-label="Redimensionner la hauteur du planning" tabindex="0">
      <span class="ps-splitter-grip" aria-hidden="true"></span>
    </div>
    <div class="ps-pane ps-pane--charge">
      <div id="ps-charge" class="ps-charge"></div>
      <div id="ps-charge-empty" class="ps-charge-empty" hidden>Aucun previsionnel pour ce projet.</div>
    </div>
  </main>

  <div id="ps-edit-segment-modal" class="ps-modal" style="display: none;">
    <div class="ps-modal-content ps-modal-content--segment">
      <div class="ps-modal-header">
        <div>
          <h2>Modifier le segment</h2>
          <p class="ps-modal-subtitle">Choisissez une nouvelle plage au demi-jour pres.</p>
        </div>
        <button id="ps-edit-segment-cancel" type="button" class="ps-modal-close-btn">Fermer</button>
      </div>
      <div class="ps-segment-edit-form">
        <div class="ps-segment-edit-grid">
          <label class="ps-segment-edit-field">
            <span>Debut</span>
            <input type="date" id="ps-edit-segment-start-date">
          </label>
          <label class="ps-segment-edit-field">
            <span>Periode</span>
            <select id="ps-edit-segment-start-part">
              <option value="am">Matin</option>
              <option value="pm">Apres-midi</option>
            </select>
          </label>
          <label class="ps-segment-edit-field">
            <span>Fin</span>
            <input type="date" id="ps-edit-segment-end-date">
          </label>
          <label class="ps-segment-edit-field">
            <span>Periode</span>
            <select id="ps-edit-segment-end-part">
              <option value="am">Matin</option>
              <option value="pm">Apres-midi</option>
            </select>
          </label>
        </div>
        <section class="ps-segment-edit-section">
          <div class="ps-segment-edit-section-copy">
            <h3>Jours Effectifs :</h3>
          </div>
          <div class="ps-segment-edit-grid ps-segment-edit-grid--effectif">
            <label class="ps-segment-edit-field">
              <span>Jours effectifs travailles</span>
              <input type="number" id="ps-edit-segment-effectif" min="0" step="0.5" placeholder="0">
            </label>
            <div class="ps-segment-edit-metric">
              <span class="ps-segment-edit-metric-label">Jours disponibles dans la plage</span>
              <strong id="ps-edit-segment-calculated-days">--</strong>
            </div>
          </div>
        </section>
        <p id="ps-edit-segment-feedback" class="ps-segment-edit-feedback" hidden></p>
      </div>
      <div class="ps-segment-edit-footer">
        <button id="ps-edit-segment-save" type="button">Enregistrer</button>
      </div>
    </div>
  </div>
</body>
</html>
