<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Sélection Plans</title>

  <!-- Grist Plugin API -->
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>

  <!-- Styles -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="affichage.css">
  <link rel="stylesheet" href="contextMenu.css">
  <link rel="stylesheet" href="AjouterProjet.css">

  <!-- jsPDF and html2canvas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://npmcdn.com/flatpickr/dist/l10n/fr.js"></script>
  <script src="script.js" defer></script>
  <script src="affichage.js" defer></script>
  <script src="contextMenu.js" defer></script>
  <script src="AjouterProjet.js" defer></script>
  <script src="AjouterReferenceDocument.js" defer></script>
</head>
<body>
  <div class="sticky-container">
    <div class="dropdown-container">
      <label for="projectDropdown">Projet :_</label>
      <select id="projectDropdown">
        <option value="">Choisir un projet</option>
      </select>
    </div>

    <div class="dropdown-container">
      <label for="typeDocumentDropdown">Type document :</label>
      <select id="typeDocumentDropdown">
        <option value="__ALL_TYPES__">Tous les types</option>
      </select>
    </div>

    <div class="dropdown-container">
      <label for="zoneDropdown">Zone :</label>
      <select id="zoneDropdown" disabled>
        <option value="__ALL_ZONES__">Toutes les zones</option>
      </select>
    </div>

    <div class="dropdown-container" style="justify-content: flex-end; padding-bottom: 8px;">
      <button id="btn-print" style="padding: 8px 16px; background-color: #004990; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">Imprimer</button>
    </div>
  </div>

  <div id="plans-output">
    
  </div>

  <div id="dialog-placeholder">

  </div>

  <!-- === Dialogue : Ajouter un document (automatique: projet & type depuis les dropdowns de la page) === -->
  <dialog id="dlg-ajouter-ref-doc">
    <form method="dialog" id="form-ajouter-ref-doc" class="dialog-body" style="min-width:420px;gap:12px;display:flex;flex-direction:column">
      <h3 style="margin:0 0 8px">Ajouter un document</h3>

      <div style="font-size:12px;opacity:.8">
        Le <strong>Projet</strong> et le <strong>Type de document</strong> seront pris automatiquement depuis les 1ère et 2ème listes déroulantes de la page.
      </div>

      <label style="display:flex;flex-direction:column;gap:6px">
        <span>Numéro de document</span>
        <input id="ard-numero" type="number" step="1" min="0" required />
      </label>

      <label style="display:flex;flex-direction:column;gap:6px">
        <span>Nom du document</span>
        <input id="ard-nom" type="text" required />
      </label>

      <menu style="display:flex;justify-content:flex-end;gap:8px;margin:8px 0 0">
        <button type="reset" id="ard-cancel">Annuler</button>
        <button type="submit" id="ard-save">Ajouter</button>
      </menu>
    </form>
  </dialog>

  <dialog id="dlg-confirm-delete-document">
    <form method="dialog" class="dialog-body" style="min-width:420px;gap:12px;display:flex;flex-direction:column">
      <h3 style="margin:0 0 8px">Supprimer le document</h3>
      <p id="confirm-delete-document-message" style="margin:0;">
        Es-tu sûr de vouloir supprimer ce document ?
      </p>
      <menu class="dialog-buttons" style="margin:8px 0 0;">
        <button type="button" id="confirm-delete-document-cancel" class="cancel-button">Annuler</button>
        <button type="button" id="confirm-delete-document-confirm">Supprimer</button>
      </menu>
    </form>
  </dialog>

</body>
</html>
