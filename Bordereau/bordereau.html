<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bordereau de transmission</title>

  <!-- Grist Plugin API -->
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>

  <!-- jsPDF and html2canvas -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <link rel="stylesheet" href="bordereau.css">
</head>

<body>
  <div class="sticky-container">
    <div class="dropdown-container">
      <label for="projectDropdown">Projet :</label>
      <select id="projectDropdown">
        <option value="">Choisir un projet</option>
      </select>
    </div>

    <div class="info-container">
      <label for="refInput">Ref :</label>
      <div class="ref-container">
        <input type="text" id="refInput" value="1" inputmode="numeric">
        <div class="ref-arrows">
          <button id="refUp" type="button" aria-label="R&eacute;f&eacute;rence suivante">&#9650;</button>
          <button id="refDown" type="button" aria-label="R&eacute;f&eacute;rence pr&eacute;c&eacute;dente">&#9660;</button>
        </div>
      </div>

      <label for="dateInput">Date :</label>
      <input type="date" id="dateInput">
    </div>

    <div class="button-container">
      <label class="sent-container" for="sentCheckbox">
        <span>Envoy&eacute; :</span>
        <input type="checkbox" id="sentCheckbox">
      </label>

      <button id="addItem" type="button">Ajouter des &eacute;l&eacute;ments</button>
      <button id="generatePdf" type="button">G&eacute;n&eacute;rer le bordereau</button>
    </div>
  </div>

  <main class="main-container">
    <table id="invoiceTable">
      <thead>
        <tr>
          <th>N&deg; Plan</th>
          <th>Indice</th>
          <th>D&eacute;signation</th>
          <th class="diffusion-column no-print">Date de diffusion</th>
          <th id="nbrExemplairesHeader" class="bulk-fill-header" title="Appliquer a toutes les lignes">
            <div class="bulk-fill-content">
              <span>Nbr exemplaires</span>
              <button
                id="bulkNbrExemplairesButton"
                class="bulk-fill-button no-print"
                type="button"
                aria-label="Appliquer un nombre d'exemplaires a toutes les lignes"
              >Remplir</button>
            </div>
          </th>
          <th class="action-column no-print"></th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </main>

  <dialog id="addElementsDialog" class="add-elements-dialog">
    <form method="dialog" class="add-elements-panel">
      <header class="add-elements-header">
        <div>
          <h2>Ajouter des &eacute;l&eacute;ments</h2>
          <p id="addElementsSubtitle"></p>
        </div>
        <button id="closeAddElementsDialog" class="dialog-icon-button" type="button" aria-label="Fermer">x</button>
      </header>

      <div id="addElementsList" class="add-elements-list"></div>

      <footer class="add-elements-footer">
        <p id="addElementsStatus" aria-live="polite"></p>
        <div class="add-elements-actions">
          <button id="cancelAddElements" type="button" class="secondary-button">Annuler</button>
          <button id="confirmAddElements" type="button">Ajouter la s&eacute;lection</button>
        </div>
      </footer>
    </form>
  </dialog>

  <script src="bordereau.js" defer></script>
</body>
</html>
