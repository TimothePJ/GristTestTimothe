<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Planning Projet</title>

  <!-- Grist -->
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>

  <!-- vis-timeline (même système que timeline-calendar.zip) -->
  <script src="https://unpkg.com/vis-timeline/standalone/umd/vis-timeline-graph2d.min.js"></script>
  <link
    rel="stylesheet"
    href="https://unpkg.com/vis-timeline/styles/vis-timeline-graph2d.min.css"
  />

  <!-- Styles app -->
  <link rel="stylesheet" href="./assets/css/variables.css" />
  <link rel="stylesheet" href="./assets/css/styles.css" />

  <!-- App -->
  <script type="module" src="./assets/js/main.js" defer></script>
</head>
<body>
  <!-- Toolbar style timeline-calendar -->
  <div id="toolbar">
    <div class="nav-buttons">
      <button id="btn-prev" type="button" title="Période précédente">&lt;</button>
      <button id="btn-today" type="button">Aujourd'hui</button>
      <button id="btn-next" type="button" title="Période suivante">&gt;</button>
    </div>

    <div class="filters">
      <label for="projectDropdown" class="toolbar-label">Projet :</label>
      <select id="projectDropdown" disabled>
        <option value="">Choisir un projet</option>
      </select>

      <label for="zoneDropdown" class="toolbar-label">Zone :</label>
      <select id="zoneDropdown" disabled>
        <option value="">Toutes les zones</option>
      </select>
    </div>

    <!-- Zoom : uniquement semaine / mois / année -->
    <div class="zoom-buttons" aria-label="Niveau de zoom">
      <button type="button" data-zoom="week" class="active">Semaine</button>
      <button type="button" data-zoom="month">Mois</button>
      <button type="button" data-zoom="year">Année</button>
    </div>

    <div id="current-date-range" aria-live="polite"></div>
  </div>

  <!-- Header tableau (4 colonnes à gauche + planning à droite) -->
  <div class="planning-header-row">
    <div class="planning-header-left">
      <div class="hcol c-id2">Id</div>
      <div class="hcol c-task">Tâches</div>
      <div class="hcol c-ligne-planning">Ligne<br>planning</div>
      <div class="hcol c-start">D&eacute;but</div>
      <div class="hcol c-duration-1">Dur&eacute;e</div>
      <div class="hcol c-end">Fin</div>
      <div class="hcol c-duration-2">Dur&eacute;e</div>
      <div class="hcol c-demarrage">D&eacute;marrage<br>Travaux</div>
      <div class="hcol c-indice">Indice</div>
      <div class="hcol c-realise">Realisation<br>(En %)</div>
      <div class="hcol c-retards">Retard<br>(j)</div>
    </div>
    <div class="planning-header-right">Planning</div>
  </div>

  <!-- Timeline -->
  <div id="timelineWrapper">
    <div id="planningTimeline"></div>
  </div>

  <div id="addZoneModal" class="add-zone-modal" hidden aria-hidden="true">
    <div class="add-zone-modal__backdrop" data-zone-modal-close></div>
    <div
      class="add-zone-modal__panel"
      role="dialog"
      aria-modal="true"
      aria-labelledby="addZoneModalTitle"
    >
      <div class="add-zone-modal__header">
        <div class="add-zone-modal__title-wrap">
          <h2 id="addZoneModalTitle">Ajouter une zone</h2>
        </div>
        <button
          id="addZoneModalCloseBtn"
          class="add-zone-modal__close-btn"
          type="button"
          aria-label="Fermer"
        >x</button>
      </div>

      <form id="addZoneForm" class="add-zone-modal__form" autocomplete="off">
        <label for="addZoneProjectName">Projet</label>
        <input id="addZoneProjectName" type="text" readonly />

        <label for="addZoneName">Nom de zone</label>
        <input
          id="addZoneName"
          type="text"
          placeholder="Ex: G2 / Zone Nord"
          maxlength="80"
        />

        <p id="addZoneModalHint" class="add-zone-modal__hint"></p>

        <div class="add-zone-modal__actions">
          <button id="addZoneCancelBtn" type="button" class="btn-secondary">
            Annuler
          </button>
          <button id="addZoneSubmitBtn" type="submit" class="btn-primary">
            Creer la zone
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- Statut / messages -->
  <div id="planningStatus" class="planning-status"></div>
</body>
</html>
