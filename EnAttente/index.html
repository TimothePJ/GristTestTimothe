<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>En attente</title>

  <!-- API Grist -->
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>

  <link rel="stylesheet" href="./css/style.css" />
  <link rel="stylesheet" href="./css/components.css" />
</head>

<body>
  <div class="sticky-container">
    <div class="dropdown-container">
      <label for="firstColumnDropdown">Projet :</label>
      <select id="firstColumnDropdown">
        <option value="">Choisir un projet</option>
      </select>
    </div>

    <div class="dropdown-container">
      <label for="secondColumnListbox">Document :</label>
      <select id="secondColumnListbox" disabled>
        <option value="ALL">Tous</option>
      </select>
    </div>

    <div class="dropdown-container">
      <label for="thirdColumnDropdown">Type de doc :</label>
      <select id="thirdColumnDropdown" disabled>
        <option value="">Tous les types</option>
      </select>
    </div>

    <div class="dropdown-container">
      <label for="zoneDropdown">Zone :</label>
      <select id="zoneDropdown" disabled>
        <option value="__ALL_ZONES__">Toutes les zones</option>
      </select>
    </div>
  </div>

  <main id="content" class="content-area">
    <section class="card" id="chartCard">
      <div id="chartTitle" class="card-title">EN ATTENTE</div>

      <div class="chart-row">
        <canvas id="pieCanvas" width="280" height="280"></canvas>
        <div id="legend" class="legend"></div>
        <div id="chartNumbers" class="chart-numbers">Choisir un projet</div>
      </div>
    </section>

    <section class="card" id="detailsCard">
      <div id="detailsTitle" class="card-title">Lignes EN ATTENTE</div>

      <div class="table-container">
        <table id="detailsTable">
          <thead>
            <tr>
              <th>&Eacute;metteur</th>
              <th>R&eacute;f&eacute;rence</th>
              <th>Indice</th>
              <th>Re&ccedil;u</th>
              <th>Observation</th>
              <th>Bloquant</th>
            </tr>
          </thead>
          <tbody id="detailsTbody"></tbody>
        </table>
      </div>

      <div id="detailsFooter" class="details-footer"></div>
    </section>
  </main>

  <script src="./js/utils.js"></script>
  <script src="./js/grist.js"></script>
  <script src="./js/render.js"></script>
  <script src="./js/script.js"></script>
</body>
</html>
